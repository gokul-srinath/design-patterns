<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Clicker 2.0</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="section1">
        <ol class="list" type="A"></ol>
      </div>
      <div class="section2">
        <h2 class="default">click cat to display picture here</h2>
        <div class="cat">
          <h2 class="name"></h2>
          <div class="click">
            <img src="" alt="cat" width="350px" height="450px" class="img">
          </div>
          <div class="control">
            <div class="content">
              Number of clicks : <span class="counter"> </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
